# IDEKube access-token authentication map.
# At container startup authn.sh replaces __IDEKUBE_ACCESS_TOKEN_PLACEHOLDER__
# with the real token value, or overwrites this file with a permit-all map
# when IDEKUBE_ACCESS_TOKEN is not set.
#
# Note: $arg_ variables do NOT convert hyphens to underscores, so we extract
# the hyphenated query param via regex on $args, then compare the value.

# Step 1: extract token value from query string (hyphenated param name)
map $args $__idekube_token_from_arg {
    default "";
    "~(?:^|&)idekube-container-access-token=([^&]*)" $1;
}

# Step 2: check each source against the expected token
map $__idekube_token_from_arg $__idekube_token_arg_ok {
    default 0;
    "__IDEKUBE_ACCESS_TOKEN_PLACEHOLDER__" 1;
}

map $cookie_idekube_container_access_token $__idekube_token_cookie_ok {
    default 0;
    "__IDEKUBE_ACCESS_TOKEN_PLACEHOLDER__" 1;
}

map $http_x_idekube_container_access_token $__idekube_token_header_ok {
    default 0;
    "__IDEKUBE_ACCESS_TOKEN_PLACEHOLDER__" 1;
}

# Step 3: permit if any source matched
map "$__idekube_token_arg_ok:$__idekube_token_cookie_ok:$__idekube_token_header_ok" $idekube_access_permitted {
    default 0;
    "~1" 1;
}
