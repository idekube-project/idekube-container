name: publish-staging

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      lineup:
        description: "universal, ascend, or both"
        required: false
        type: choice
        options: [universal, ascend, both]
        default: both

jobs:
  publish:
    name: ${{ matrix.lineup }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        lineup: [universal, ascend]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Skip lineup if dispatch selected the other one
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.lineup != 'both' && github.event.inputs.lineup != matrix.lineup }}
        run: |
          echo "Skipping ${{ matrix.lineup }} (dispatch selected ${{ github.event.inputs.lineup }})"
          echo "SKIP=1" >> $GITHUB_ENV

      - name: Setup Docker build environment
        if: env.SKIP != '1'
        uses: ./.github/actions/setup-docker-buildx
        with:
          login: ${{ github.event_name != 'pull_request' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build staging images for PR validation (${{ matrix.lineup }})
        if: env.SKIP != '1' && github.event_name == 'pull_request'
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl,docker-bake.staging.hcl
          targets: ${{ matrix.lineup }}
          push: false

      - name: Build and push staging images (${{ matrix.lineup }})
        if: env.SKIP != '1' && github.event_name != 'pull_request'
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl,docker-bake.staging.hcl
          targets: ${{ matrix.lineup }}
          push: true
