name: setup-docker-buildx
description: Setup QEMU and Buildx, and optionally log in to GHCR
inputs:
  login:
    description: Whether to login to ghcr.io
    required: false
    default: 'true'
  username:
    description: Username for ghcr.io login
    required: false
  password:
    description: Password/token for ghcr.io login
    required: false
runs:
  using: composite
  steps:
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3
    - if: inputs.login == 'true'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}
